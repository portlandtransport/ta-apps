<!DOCTYPE html>
<html>
    <head>
        <script src="../js/trWeatherCredentials.js"></script>
        <script src="../js/trAQICredentials.js"></script>
        <script>

            var results = {};
            // early parsing of query string
	
            function getQueryVariable(variable) {
                var query = window.location.search.substring(1);
                var vars = query.split('&');
                for (var i = 0; i < vars.length; i++) {
                    var pair = vars[i].split('=');
                    if (decodeURIComponent(pair[0]) == variable) {
                        return decodeURIComponent(pair[1]);
                    }
                }
                return "";
            }

            var lat = getQueryVariable('lat');
            var lon = getQueryVariable('lon');

            // AQI

            var api_key = trAQICredentials('waqi');

            var aqi_url = "https://api.waqi.info/feed/geo:"+lat+";"+lon+"/?token="+api_key;

            const xhr = new XMLHttpRequest();

            xhr.responseType = 'text';

            xhr.open('GET', aqi_url, true);

            // Set up the event handler for when the request state changes
            xhr.onreadystatechange = function() {
                // Check if the request is complete (readyState 4) and successful (status 200)

                if (xhr.readyState === 4 && xhr.status === 200) {	

                    // now try parsing json
                    try {
                        var data = JSON.parse(xhr.responseText);
                        console.log("raw data: "+data);
                        // Process data
                        if ( typeof data != "undefined") {
                            // process here


                            results.aqi = data.data.aqi;
                            console.log(results.aqi);


                        } else {
                            console.log("AQI data undefined");
                            location.reload();
                        }
                    } catch (e) {
                        console.log("json parsing error in AQI");
                        console.log(e);
                        location.reload();
                    }

                } else if (xhr.readyState === 4 && xhr.status !== 200) {
                    console.log("xhr state error in AQI");
                    location.reload();
                }
            };
            xhr.send();

            // Weather
            var weather = {};
            var api_key = trWeatherCredentials('WeatherAPI');
            var weather_url = "https://api.weatherapi.com/v1/current.json?key="+api_key+"&q="+lat+","+lon+"&aqi=no";

            const xhr_w = new XMLHttpRequest();

            xhr_w.responseType = 'text';

            xhr_w.open('GET', weather_url, true);

            // Set up the event handler for when the request state changes
            xhr_w.onreadystatechange = function() {
                // Check if the request is complete (readyState 4) and successful (status 200)

                if (xhr_w.readyState === 4 && xhr_w.status === 200) {	

                    // now try parsing json
                    try {
                        var data = JSON.parse(xhr_w.responseText);
                        // Process data
                        if ( typeof data != "undefined") {
                            // process here
                            if (data.current && data.current.condition) {
                                weather.summary = data.current.condition.text;

                                weather.temperature = Math.floor(data.current.temp_f + 0.5)+"&deg;";
                                weather.windchill = null;
                                weather.heatindex = null;
                                if (data.current.windchill_f < data.current.temp_f - 5 && data.current.windchill_f < 35) {
                                    weather.windchill = "Wind Chill "+Math.floor(data.current.windchill_f + 0.5)+"&deg;";
                                }
                                if (data.current.heatindex_f > data.current.temp_f + 5 && data.current.heatindex_f > 70) {
                                    weather.heatindex = "Heat Index "+Math.floor(data.current.heatindex_f + 0.5)+"&deg;";
                                }
                                var icon_url = data.current.condition.icon;
                                weather.icon = '<img src="'+icon_url+'" style="height: 1.4em; margin: -0.2em">';
                                weather.timestamp = new Date();
                                results.weather = weather;
                                console.log(weather.summary);
                            } else {
                                console.log("Weather data undefined");
                                location.reload();
                            }
                        } else {
                            console.log('Weather parsing error');
                            location.reload();								
                        }
                    } catch (e) {
                        //console.log("json parsing error");
                        //console.log(e);
                        console.log("json parsing error in Weather");
                        console.log(e);
                        location.reload();
                    }

                } else if (xhr_w.readyState === 4 && xhr_w.status !== 200) {
                    console.log("xhr state error in Weather");
                    location.reload();
                }
            };
            // Send the request
		    xhr_w.send();

            function check_results() {
                if (results.hasOwnProperty("aqi") || results.hasOwnProperty("weather")) {
                    paint_page();
                } else {
                    setTimeout(check_results,100);
                }
            }

            function paint_page() {
                const myDiv = document.getElementById("data");
                myDiv.append("AQI: "+results.aqi+"<br>"+"Summary: "+results.weather.summary);
            }

        </script>
    </head>
    <body>
        <div id="data"></div>
    </body>
</html>
